<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agregar Producto - Inventario</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Agregar Nuevo Producto</h1>
        
        {% if errores %}
        <div class="errores">
            <ul>
                {% for error in errores %}<li>{{ error }}</li>{% endfor %}
            </ul>
        </div>
        {% endif %}

        <form action="/agregar" method="POST" class="form-crud">
            <label>Nombre del Producto: <input type="text" name="nombre" required></label>
            <label>Descripción: <textarea name="descripcion" rows="3"></textarea></label>
            <label>Categoría: 
                <select name="categoria">
                    {% for cat in categorias %}<option value="{{ cat }}">{{ cat }}</option>{% endfor %}
                </select>
            </label>
            <label>Precio unitario ($): <input type="number" step="0.01" name="precio" value="0" required></label>
            <label>Stock inicial: <input type="number" name="stock" value="0" required></label>
            <label>Alerta de stock mínimo: <input type="number" name="stock_minimo" value="5" required></label>
            
            <button type="submit">Guardar Producto</button>
            <a href="/" class="btn-limpiar" style="text-align: center; display: block;">Cancelar</a>
        </form>
    </div>
</body>
</html>
