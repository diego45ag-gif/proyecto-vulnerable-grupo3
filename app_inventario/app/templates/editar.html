<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Producto - Inventario</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Editar Producto: {{ producto.nombre }}</h1>

        <form action="/editar/{{ producto.id }}" method="POST" class="form-crud">
            <label>Nombre del Producto: <input type="text" name="nombre" value="{{ producto.nombre }}" required></label>
            <label>Descripción: <textarea name="descripcion" rows="3">{{ producto.descripcion }}</textarea></label>
            <label>Categoría: 
                <select name="categoria">
                    {% for cat in categorias %}
                        <option value="{{ cat }}" {% if producto.categoria == cat %}selected{% endif %}>{{ cat }}</option>
                    {% endfor %}
                </select>
            </label>
            <label>Precio unitario ($): <input type="number" step="0.01" name="precio" value="{{ producto.precio }}" required></label>
            <label>Stock actual: <input type="number" name="stock" value="{{ producto.stock }}" required></label>
            <label>Alerta de stock mínimo: <input type="number" name="stock_minimo" value="{{ producto.stock_minimo }}" required></label>
            
            <button type="submit">Actualizar Producto</button>
            <a href="/" class="btn-limpiar" style="text-align: center; display: block;">Cancelar</a>
        </form>
    </div>
</body>
</html>
