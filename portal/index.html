<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal DevSecOps - Grupo 3</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e2f;
            color: white;
            text-align: center;
            padding: 50px;
            margin: 0;
        }
        h1 { color: #4CAF50; font-size: 2.5em; margin-bottom: 10px; }
        p.subtitle { color: #a0a0b5; margin-bottom: 40px; font-size: 1.2em; }
        
        .grid-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            max-width: 1000px;
            margin: 0 auto;
        }
        
        .card {
            background: #2a2a40;
            padding: 30px;
            border-radius: 12px;
            width: 200px;
            text-decoration: none;
            color: white;
            border: 2px solid transparent;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        .card:hover {
            transform: translateY(-10px);
            border-color: #4CAF50;
            background: #32324e;
            box-shadow: 0 8px 25px rgba(76, 175, 80, 0.4);
        }
        
        .card h2 { margin: 0 0 10px 0; font-size: 1.5em; }
        .card p { margin: 0; color: #8888a0; }
        .icon { font-size: 3em; margin-bottom: 15px; }
    </style>
</head>
<body>

    <h1>🛡️ Dashboard DevSecOps</h1>
    <p class="subtitle">Plataforma de Microservicios Unificados - Grupo 3</p>

    <div class="grid-container">
        <a href="http://localhost:5001" target="_blank" class="card">
            <div class="icon">👥</div>
            <h2>Usuarios</h2>
            <p>Puerto 5001</p>
        </a>

        <a href="http://localhost:5002" target="_blank" class="card">
            <div class="icon">📦</div>
            <h2>Inventario</h2>
            <p>Puerto 5002</p>
        </a>

        <a href="http://localhost:5003" target="_blank" class="card">
            <div class="icon">✅</div>
            <h2>Tareas</h2>
            <p>Puerto 5003</p>
        </a>

        <a href="http://localhost:5000" target="_blank" class="card">
            <div class="icon">📝</div>
            <h2>Notas</h2>
            <p>Puerto 5000</p>
        </a>
    </div>

</body>
</html>
